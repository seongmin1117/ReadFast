version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: rf-mysql
    restart: always
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: read-fast
    volumes:
      - rf-mysql-data:/var/lib/mysql

  metabase:
    image: metabase/metabase:v0.51.2
    container_name: rf-metabase
    ports:
      - "3000:3000"
    volumes:
      - ./metabase-data:/metabase-data
      - ./archive-data:/archive-data   # ✅ DuckDB 로그 파일 공유
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      JAVA_OPTS: "-Xmx2g"  # JVM 메모리 제한 설정
    restart: always

volumes:
  rf-mysql-data:
